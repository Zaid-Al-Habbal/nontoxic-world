services:
  backend:
    build: ./back-end
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  frontend:
    build: ./front-end
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy