services:
  backend:
    build: ./back-end
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "--connect-timeout", "10", "--max-time", "30", "http://localhost:8000/health"]
      interval: 60s
      timeout: 45s
      start_period: 120s
      retries: 10

  frontend:
    build: ./front-end
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy